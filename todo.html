<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comeback Warrior App</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --success-color: #4ade80;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* App Container: Makes it feel like a mobile app */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 850px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid #334155;
            position: relative;
        }

        /* Top Header */
        .app-header {
            padding: 20px;
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            border-bottom: 1px solid #334155;
        }

        .app-header h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 2.5rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        .app-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Main Screen Content Area */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 80px; /* Space for bottom nav */
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress Bar Widget */
        .progress-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .progress-text {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            background: #334155;
            height: 12px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, #38bdf8, #4ade80);
            width: 0%;
            height: 100%;
            transition: width 0.4s ease;
        }

        /* Task List Styling */
        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-item {
            background: #1e293b;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 5px solid var(--accent-color);
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .task-item.completed {
            border-left-color: var(--success-color);
            opacity: 0.6;
        }

        .task-info h3 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .task-info p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .task-item.completed .task-info h3 {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Stylish Checkbox Button */
        .check-btn {
            background: #334155;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            transition: all 0.2s;
        }

        .task-item.completed .check-btn {
            background: var(--success-color);
            color: #0f172a;
        }

        /* Goals Screen Style */
        .goal-box {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 800;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }

        /* Chat Screen Style (Mockup) */
        .chat-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            height: 450px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 15px;
        }

        .chat-bubble {
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.9rem;
        }

        .chat-bubble.me {
            background: var(--accent-color);
            color: #0f172a;
            align-self: flex-end;
            font-weight: 600;
        }

        .chat-bubble.friend {
            background: #334155;
            color: white;
            align-self: flex-start;
        }

        /* Bottom Navigation Bar (The App Feel) */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: #1e293b;
            border-top: 1px solid #334155;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 5px;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }

        .nav-item.active {
            color: var(--accent-color);
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <h1>Comeback Warrior</h1>
            <p id="current-date">July 1, 2026</p>
        </header>

        <main class="app-content">

            <div id="screen-dashboard" class="screen active">
                <div class="progress-card">
                    <div class="progress-text">Today's Comeback: <span id="progress-percent">0%</span> Done</div>
                    <div class="progress-bar-bg">
                        <div id="progress-fill" class="progress-bar-fill"></div>
                    </div>
                </div>

                    </div>

                        <div class="task-info">
                            <h3>Subject 2: Revision</h3>
                            <p>⏱️ Slot: 1.5 Hours</p>
