<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comeback Warrior - colorful Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #FF9A9E 0%, #FECFEF 99%, #FECFEF 100%);
            margin: 0;
            display: flex;
            height: 100vh;
            color: #333;
        }
        .sidebar {
            width: 260px;
            background: linear-gradient(to bottom, #89F7FE 0%, #66A6FF 100%);
            color: white;
            display: flex;
            flex-direction: column;
            padding: 25px;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }
        .sidebar h2 {
            font-size: 26px;
            margin-bottom: 40px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }
        .sidebar ul {
            list-style-type: none;
            padding: 0;
        }
        .sidebar li {
            margin-bottom: 15px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            border-radius: 8px;
            transition: background 0.3s;
            font-weight: 500;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .main-content {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.85);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #4A00E0;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .card {
            background: linear-gradient(to right, #F8BBD0, #E1BEE7);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h3 {
            margin-top: 0;
            color: #8E24AA;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Comeback Warrior</h2>
        <ul>
            <li><a href="#" class="active">Dashboard</a></li>
            <li><a href="todo.html">To-Do List</a></li>
            <li><a href="tracker.html">Goal Tracker</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">
            <h1>Dashboard</h1>
            <span>Welcome, Warrior!</span>
        </div>
        <div class="cards-container">
            <div class="card">
                <h3>Daily Tasks</h3>
                <p>Track your daily activities with colorful energy.</p>
            </div>
            <div class="card">
                <h3>Goal Tracker</h3>
                <p>Monitor your progress visually.</p>
            </div>
            <div class="card">
                <h3>Achievements</h3>
                <p>See how far you've come now.</p>
            </div>
        </div>
    </div>
</body>
</html>
